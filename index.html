<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>GitHub README Generator</title>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gray-50 text-gray-900">

  <main class="max-w-6xl mx-auto px-6 py-12">

    <!-- Header -->
    <header class="mb-10">

      <h1 class="text-4xl font-bold tracking-tight">
        GitHub README Generator
      </h1>

      <p class="mt-3 text-gray-600">
        GitHubプロフィールから情報を取得して、実用的なREADME.mdを自動生成します。
      </p>

    </header>


    <!-- Input Section -->
    <section
      class="bg-white border border-gray-200 rounded-2xl p-6 shadow-sm"
    >

      <label
        for="username"
        class="block text-sm font-medium text-gray-700 mb-2"
      >
        GitHub Username
      </label>


      <div class="flex flex-col sm:flex-row gap-3">

        <input
          id="username"
          type="text"
          placeholder="例: qianyu15"
          autocomplete="off"
          class="flex-1 px-4 py-3 border border-gray-300 rounded-xl outline-none transition focus:ring-2 focus:ring-black"
        />


        <button
          id="generateBtn"
          type="button"
          class="px-6 py-3 rounded-xl bg-black text-white font-medium hover:bg-gray-800 transition disabled:opacity-50 disabled:cursor-not-allowed"
        >
          Generate README
        </button>

      </div>


      <p
        id="status"
        class="mt-4 text-sm text-gray-500"
      ></p>

    </section>


    <!-- Result Section -->
    <section
      id="resultSection"
      class="hidden mt-8"
    >

      <!-- Header -->
      <div
        class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-4"
      >

        <h2 class="text-2xl font-bold">
          Generated README.md
        </h2>


        <!-- Action Buttons -->
        <div class="flex items-center gap-2">


          <!-- Copy Button -->
          <button
            id="copyBtn"
            type="button"
            aria-label="Copy README"
            title="Copy README"
            class="group w-11 h-11 flex items-center justify-center rounded-xl border border-gray-300 bg-white text-gray-700 hover:bg-gray-100 hover:text-black transition"
          >

            <!-- Copy Icon -->
            <svg
              id="copyIcon"
              xmlns="http://www.w3.org/2000/svg"
              width="21"
              height="21"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >

              <rect
                width="13"
                height="13"
                x="9"
                y="9"
                rx="2"
                ry="2"
              />

              <path
                d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"
              />

            </svg>


            <!-- Check Icon -->
            <svg
              id="checkIcon"
              class="hidden"
              xmlns="http://www.w3.org/2000/svg"
              width="21"
              height="21"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >

              <path d="M20 6 9 17l-5-5" />

            </svg>

          </button>


          <!-- Download Button -->
          <button
            id="downloadBtn"
            type="button"
            aria-label="Download README.md"
            title="Download README.md"
            class="w-11 h-11 flex items-center justify-center rounded-xl bg-black text-white hover:bg-gray-800 transition"
          >

            <!-- Download Icon -->
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="21"
              height="21"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >

              <path
                d="M12 3v12"
              />

              <path
                d="m7 10 5 5 5-5"
              />

              <path
                d="M5 21h14"
              />

            </svg>

          </button>

        </div>

      </div>


      <!-- README Preview -->
      <div
        class="bg-gray-900 rounded-2xl overflow-hidden shadow-lg"
      >

        <!-- Window Header -->
        <div
          class="flex items-center gap-2 px-4 py-3 bg-gray-800"
        >

          <div
            class="w-3 h-3 rounded-full bg-red-400"
          ></div>

          <div
            class="w-3 h-3 rounded-full bg-yellow-400"
          ></div>

          <div
            class="w-3 h-3 rounded-full bg-green-400"
          ></div>


          <span
            class="ml-3 text-sm text-gray-400"
          >
            README.md
          </span>

        </div>


        <!-- Code -->
        <pre
          id="readmePreview"
          class="p-6 overflow-x-auto text-sm leading-7 text-gray-100 whitespace-pre-wrap"
        ></pre>

      </div>

    </section>

  </main>


  <script>

    const usernameInput =
      document.getElementById("username");

    const generateBtn =
      document.getElementById("generateBtn");

    const copyBtn =
      document.getElementById("copyBtn");

    const downloadBtn =
      document.getElementById("downloadBtn");

    const copyIcon =
      document.getElementById("copyIcon");

    const checkIcon =
      document.getElementById("checkIcon");

    const resultSection =
      document.getElementById("resultSection");

    const readmePreview =
      document.getElementById("readmePreview");

    const status =
      document.getElementById("status");


    let generatedReadme = "";


    /*
    |--------------------------------------------------------------------------
    | GitHub Account Age
    |--------------------------------------------------------------------------
    */

    function calculateAccountAge(createdAt) {

      const createdDate =
        new Date(createdAt);

      const now =
        new Date();


      let years =
        now.getFullYear() -
        createdDate.getFullYear();


      const hasNotReachedAnniversary =
        now.getMonth() < createdDate.getMonth() ||
        (
          now.getMonth() === createdDate.getMonth() &&
          now.getDate() < createdDate.getDate()
        );


      if (hasNotReachedAnniversary) {

        years--;

      }


      return Math.max(years, 0);

    }


    /*
    |--------------------------------------------------------------------------
    | Markdown Text Escape
    |--------------------------------------------------------------------------
    */

    function escapeMarkdown(text = "") {

      return text
        .replace(/\r?\n/g, " ")
        .trim();

    }


    /*
    |--------------------------------------------------------------------------
    | README Generator
    |--------------------------------------------------------------------------
    */

    function generateReadme(user, repos) {


      /*
      |--------------------------------------------------------------------------
      | GitHub登録年数
      |--------------------------------------------------------------------------
      */

      const accountAgeYears =
        calculateAccountAge(
          user.created_at
        );


      /*
      |--------------------------------------------------------------------------
      | 実務経験年数として表示
      |--------------------------------------------------------------------------
      */

      const practicalExperience =
        accountAgeYears === 1
          ? "1 year"
          : `${accountAgeYears} years`;


      /*
      |--------------------------------------------------------------------------
      | Skills
      |--------------------------------------------------------------------------
      */

      const skills =
        new Set();


      repos.forEach(repo => {

        if (repo.language) {

          skills.add(
            repo.language
          );

        }

      });


      const skillList =
        skills.size > 0

          ? [...skills]
              .sort()
              .map(skill => `- ${skill}`)
              .join("\n")

          : "- No language information available";


      /*
      |--------------------------------------------------------------------------
      | Projects
      |--------------------------------------------------------------------------
      */

      const projectList =
        repos.length > 0

          ? repos
              .map(repo => {

                const description =
                  escapeMarkdown(
                    repo.description ||
                    "No description provided."
                  );


                return `### ${repo.name}

${description}

[View Repository](${repo.html_url})`;

              })
              .join("\n\n")

          : "No public repositories found.";


      /*
      |--------------------------------------------------------------------------
      | README
      |--------------------------------------------------------------------------
      */

      return `# Hi, I am ${user.name || user.login}

${escapeMarkdown(
  user.bio ||
  "I am a developer who enjoys building software."
)}

I have ${practicalExperience} of practical experience.

## Skills

${skillList}

## Projects

${projectList}

## Contact

- GitHub: [@${user.login}](${user.html_url})
${user.email ? `- Email: ${user.email}` : ""}
`;

    }


    /*
    |--------------------------------------------------------------------------
    | GitHub API
    |--------------------------------------------------------------------------
    */

    async function fetchGitHubData(username) {


      /*
      |--------------------------------------------------------------------------
      | User
      |--------------------------------------------------------------------------
      */

      const userResponse =
        await fetch(
          `https://api.github.com/users/${encodeURIComponent(username)}`
        );


      if (!userResponse.ok) {

        throw new Error(
          "GitHub user not found."
        );

      }


      const user =
        await userResponse.json();


      /*
      |--------------------------------------------------------------------------
      | Repositories
      |--------------------------------------------------------------------------
      */

      const reposResponse =
        await fetch(
          `https://api.github.com/users/${encodeURIComponent(username)}/repos?per_page=100&sort=updated`
        );


      if (!reposResponse.ok) {

        throw new Error(
          "Failed to fetch repositories."
        );

      }


      const repos =
        await reposResponse.json();


      return {
        user,
        repos
      };

    }


    /*
    |--------------------------------------------------------------------------
    | Generate
    |--------------------------------------------------------------------------
    */

    generateBtn.addEventListener(
      "click",
      async () => {


        const username =
          usernameInput.value.trim();


        if (!username) {

          status.textContent =
            "GitHub usernameを入力してください。";

          return;

        }


        generateBtn.disabled =
          true;


        generateBtn.textContent =
          "Generating...";


        status.textContent =
          "GitHubからプロフィール情報を取得中...";


        try {


          const {
            user,
            repos
          } =
            await fetchGitHubData(
              username
            );


          generatedReadme =
            generateReadme(
              user,
              repos
            );


          readmePreview.textContent =
            generatedReadme;


          resultSection.classList.remove(
            "hidden"
          );


          status.textContent =
            `@${user.login} のREADMEを生成しました。`;


        } catch (error) {


          status.textContent =
            `Error: ${error.message}`;


          resultSection.classList.add(
            "hidden"
          );


        } finally {


          generateBtn.disabled =
            false;


          generateBtn.textContent =
            "Generate README";

        }

      }
    );


    /*
    |--------------------------------------------------------------------------
    | Copy
    |--------------------------------------------------------------------------
    */

    copyBtn.addEventListener(
      "click",
      async () => {


        if (!generatedReadme) {

          return;

        }


        try {


          await navigator.clipboard.writeText(
            generatedReadme
          );


          /*
          |--------------------------------------------------------------------------
          | Icon: Copy → Check
          |--------------------------------------------------------------------------
          */

          copyIcon.classList.add(
            "hidden"
          );


          checkIcon.classList.remove(
            "hidden"
          );


          copyBtn.setAttribute(
            "aria-label",
            "Copied"
          );


          copyBtn.setAttribute(
            "title",
            "Copied"
          );


          setTimeout(() => {


            copyIcon.classList.remove(
              "hidden"
            );


            checkIcon.classList.add(
              "hidden"
            );


            copyBtn.setAttribute(
              "aria-label",
              "Copy README"
            );


            copyBtn.setAttribute(
              "title",
              "Copy README"
            );


          }, 1500);


        } catch (error) {


          status.textContent =
            "コピーに失敗しました。";

        }

      }
    );


    /*
    |--------------------------------------------------------------------------
    | Download README.md
    |--------------------------------------------------------------------------
    */

    downloadBtn.addEventListener(
      "click",
      () => {


        if (!generatedReadme) {

          return;

        }


        const blob =
          new Blob(
            [
              generatedReadme
            ],
            {
              type: "text/markdown;charset=utf-8"
            }
          );


        const url =
          URL.createObjectURL(
            blob
          );


        const link =
          document.createElement(
            "a"
          );


        link.href =
          url;


        link.download =
          "README.md";


        document.body.appendChild(
          link
        );


        link.click();


        document.body.removeChild(
          link
        );


        URL.revokeObjectURL(
          url
        );

      }
    );


    /*
    |--------------------------------------------------------------------------
    | Enter Key
    |--------------------------------------------------------------------------
    */

    usernameInput.addEventListener(
      "keydown",
      event => {


        if (
          event.key === "Enter"
        ) {

          generateBtn.click();

        }

      }
    );

  </script>

</body>
</html>
